<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LEILA">
<meta name="theme-color" content="#f6f1e7">
<title>Leila — Outfit Journal</title>
<style>
  /* ─────────────────────────────────────────────────
     Fabrique-inspired — strategic digital design.
     Crisp sans-serif typography, generous whitespace,
     monochrome palette with a single warm accent, big
     scale contrast between headlines and labels, hair-
     line rules.  Confident, modern, editorial.
     ───────────────────────────────────────────────── */
  :root{
    --bg:        #f5f1ea;   /* off-white linen */
    --bg-soft:   #ece6d8;   /* pebble */
    --bg-canvas: #c9a471;   /* camel — preserved for the look-book */
    --bg-card:   #ffffff;
    --ink:       #111111;   /* pure ink */
    --ink-mid:   #4a4a4a;   /* graphite */
    --ink-soft:  #8a8a8a;   /* mineral */
    --hair:      #cfc8b9;   /* hairline */
    --hair-soft: #e6dfce;
    --accent:    #b07a3a;   /* warm tobacco — single accent */
    --heart:     #c1462b;   /* terracotta */
    --safe-top:  env(safe-area-inset-top,0px);
    --safe-bot:  env(safe-area-inset-bottom,0px);
    /* Fabrique uses GT America / Söhne — fall back to system stacks */
    --display:   "Inter Tight","Helvetica Neue","SF Pro Display",
                 -apple-system,"PingFang TC",sans-serif;
    --sans:      -apple-system,"SF Pro Text","Inter","Helvetica Neue",
                 "PingFang TC",sans-serif;
    --mono:      "SF Mono","JetBrains Mono",ui-monospace,monospace;
    font-synthesis: none;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{
    background:var(--bg);color:var(--ink);
    font-family:var(--sans);font-weight:400;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    overscroll-behavior:none;
  }
  body{
    min-height:100vh;min-height:100dvh;
    padding-bottom:calc(58px + var(--safe-bot));
  }
  img{user-select:none;-webkit-user-drag:none;display:block}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}

  /* ─── HEADER ─── */
  header.app{
    position:sticky;top:0;z-index:30;
    padding:calc(var(--safe-top) + 16px) 22px 14px;
    background:var(--bg);
    border-bottom:1px solid var(--hair-soft);
    display:flex;align-items:center;justify-content:space-between;
  }
  header.app .brand-mark{
    font-family:var(--display);
    font-size:22px;font-weight:600;
    letter-spacing:-.01em;line-height:1;
    color:var(--ink);
    /* tight, confident sans — no subtitle */
  }
  .header-meta{
    font-family:var(--mono);font-size:10px;letter-spacing:.05em;
    color:var(--ink-soft);
  }
  .header-btn{
    width:36px;height:36px;
    display:grid;place-items:center;
    border:1px solid var(--ink);
    border-radius:0;  /* no rounded corners */
    color:var(--ink);background:transparent;
    transition:background .15s ease, color .15s ease;
  }
  .header-btn:active{background:var(--ink);color:var(--bg)}

  /* ─── MAIN / VIEWS ─── */
  main{padding:0}
  .view{display:none}
  .view.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  /* ─── LOOK BOOK ─── */
  #view-look.active{
    display:flex;flex-direction:column;align-items:center;
    padding:14px 16px 0;
    min-height:calc(100dvh - 70px - 58px - var(--safe-top) - var(--safe-bot));
  }

  .canvas-wrap{
    background:var(--bg-canvas);
    width:100%;
    /* Maximize size: only minimal chrome below (1 tracked actions row + tabbar) */
    max-width:calc((100dvh - 70px - 36px - 58px
                    - var(--safe-top) - var(--safe-bot) - 28px) * 9 / 16);
    aspect-ratio:9/16;
    margin:0 auto;
    position:relative;overflow:hidden;
    box-shadow:0 1px 0 0 var(--hair-soft);
  }
  /* layout slots: top-left top, bottom-left bottom, top-right bag, bottom-right shoes */
  .slot{
    position:absolute;display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .slot img{width:100%;height:100%;object-fit:contain;
    filter:drop-shadow(0 8px 14px rgba(20,15,8,.10))}
  .slot.empty{
    color:rgba(255,253,247,.85);
    border:1px solid rgba(255,253,247,.55);
    font-family:var(--display);
    font-size:12px;letter-spacing:-.005em;font-weight:500;
    background:rgba(255,253,247,.05);
  }
  .slot.empty::before{content:"＋";display:block;
    font-size:22px;line-height:1;margin-bottom:4px;font-weight:300}
  .slot.empty{flex-direction:column}
  .slot.top    {left:6%;top:6%;width:50%;height:42%}
  .slot.bottom {left:6%;top:42%;width:50%;height:52%}
  .slot.bag    {right:5%;top:14%;width:36%;height:30%}
  .slot.shoes  {right:5%;top:58%;width:36%;height:22%}
  .canvas-wrap.dress-mode .slot.top{display:none}
  .canvas-wrap.dress-mode .slot.bottom{top:6%;height:88%}

  /* Action row — Fabrique-style text links with hairlines */
  .canvas-actions{
    margin-top:20px;
    display:flex;align-items:center;justify-content:center;gap:0;
    border-top:1px solid var(--hair-soft);
    border-bottom:1px solid var(--hair-soft);
    padding:13px 0;width:100%;max-width:380px;
  }
  .canvas-actions button{
    flex:1;
    font-family:var(--display);font-size:13px;font-weight:400;
    letter-spacing:-.005em;color:var(--ink);
    padding:6px 4px;
    position:relative;
  }
  .canvas-actions button:not(:last-child){
    border-right:1px solid var(--hair-soft);
  }
  .canvas-actions button.primary{font-weight:600}
  .canvas-actions button.muted{color:var(--ink-soft)}

  /* ─── WARDROBE ─── */
  #view-ward.active{padding:10px 16px 24px}

  /* category strip — sentence case, weight contrast for active */
  .cat-strip{
    display:flex;align-items:center;
    overflow-x:auto;scrollbar-width:none;
    border-bottom:1px solid var(--hair);
    margin:6px -16px 16px;padding:0 16px 12px;
    gap:18px;
    flex-wrap:wrap;
  }
  .cat-strip::-webkit-scrollbar{display:none}
  .cat-tab{
    flex:0 0 auto;padding:4px 0;
    font-family:var(--display);font-size:13px;
    letter-spacing:-.005em;
    color:var(--ink-soft);font-weight:400;
    border-bottom:1px solid transparent;
    transition:color .15s,border-color .15s,font-weight .15s;
  }
  .cat-tab.active{
    color:var(--ink);font-weight:600;
    border-bottom-color:var(--ink);
  }

  /* item grid — 2 cols, editorial 4:5 photo, single-line meta
     to keep 4 cards visible without scrolling on iPhone */
  .item-grid{
    display:grid;grid-template-columns:1fr 1fr;
    gap:14px 12px;
  }
  .item-card{
    position:relative;cursor:pointer;
  }
  .item-card .ph{
    aspect-ratio:4/5;
    background:var(--bg-card);
    position:relative;overflow:hidden;
    border:1px solid var(--hair-soft);
  }
  .item-card .ph img{
    position:absolute;inset:0;
    width:100%;height:100%;object-fit:contain;
  }
  .item-card .meta{padding:8px 0 0}
  .item-card .brand{
    font-family:var(--display);font-size:11.5px;font-weight:600;
    letter-spacing:-.005em;color:var(--ink);
    line-height:1.2;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;
    overflow:hidden;
  }
  .item-card .name{
    font-family:var(--sans);font-weight:400;
    font-size:10.5px;line-height:1.3;color:var(--ink-soft);
    margin-top:2px;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;
    overflow:hidden;
  }
  .item-card .fav{
    position:absolute;right:8px;top:8px;
    width:28px;height:28px;border-radius:50%;
    background:rgba(255,255,255,.92);
    display:grid;place-items:center;
    color:var(--ink-soft);font-size:13px;
    border:1px solid var(--hair);
    z-index:2;
  }
  .item-card .fav.on{color:var(--heart);border-color:var(--heart)}

  /* ─── PICKER (single sheet) ─── */
  .picker{
    position:fixed;inset:0;z-index:60;background:rgba(20,15,8,.42);
    display:none;align-items:flex-end;
  }
  .picker.open{display:flex}
  .picker-sheet{
    width:100%;max-height:86vh;background:var(--bg);
    display:flex;flex-direction:column;
    padding:16px 18px calc(var(--safe-bot) + 14px);
    animation:slideup .25s ease;
    border-top:1px solid var(--hair);
  }
  @keyframes slideup{from{transform:translateY(40%);opacity:.6}to{transform:none;opacity:1}}
  .picker-head{
    display:flex;align-items:center;justify-content:space-between;
    padding-bottom:10px;border-bottom:1px solid var(--hair);
    margin-bottom:14px;
  }
  .picker-head h3{
    font-family:var(--display);font-weight:600;
    font-size:16px;color:var(--ink);letter-spacing:-.01em;
  }
  .picker-head .close{
    font-size:18px;color:var(--ink);padding:4px 10px;letter-spacing:.05em;
  }
  .picker-list{
    overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);
    gap:10px;-webkit-overflow-scrolling:touch;padding-bottom:6px;
  }
  .picker-list .ic{
    background:#fff;border:1px solid var(--hair-soft);
    aspect-ratio:1/1;position:relative;overflow:hidden;
  }
  .picker-list .ic img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
  }
  .picker-list .ic.selected{border:1.5px solid var(--ink)}
  .picker-list .clear{
    background:transparent;border:1px dashed var(--hair);
    color:var(--ink-soft);font-family:var(--sans);font-size:10px;
    letter-spacing:.22em;text-transform:uppercase;
    display:flex;align-items:center;justify-content:center;
  }

  /* ─── TAB BAR ─── */
  nav.tabbar{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    background:rgba(245,241,234,.94);
    backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-top:1px solid var(--hair);
    padding:8px 8px calc(var(--safe-bot) + 8px);
    display:grid;grid-template-columns:repeat(3,1fr);
  }
  nav.tabbar button{
    color:var(--ink-soft);
    font-family:var(--display);font-size:13px;font-weight:400;
    letter-spacing:-.005em;
    padding:8px 0 6px;
    position:relative;
  }
  nav.tabbar button.active{
    color:var(--ink);font-weight:600;
  }
  nav.tabbar button.active::after{
    content:"";position:absolute;left:50%;bottom:-1px;
    transform:translateX(-50%);
    width:24px;height:2px;background:var(--ink);
  }

  /* ─── FAVORITES (collection page) ─── */
  #view-fav.active{padding:8px 16px 24px}
  .section-title{
    font-family:var(--display);font-weight:600;
    font-size:14px;color:var(--ink);letter-spacing:-.005em;
    margin:20px 0 12px;
  }
  .saved-list{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .saved-card{background:var(--bg-canvas);aspect-ratio:9/16;
    position:relative;overflow:hidden;cursor:pointer;
    border:1px solid var(--hair-soft);
  }
  .saved-card .mini{position:absolute;inset:0}
  .saved-card .mini img{position:absolute;object-fit:contain}
  .saved-card .mini .top    {left:6%;top:6%;width:50%;height:42%}
  .saved-card .mini .bottom {left:6%;top:42%;width:50%;height:52%}
  .saved-card .mini .bag    {right:5%;top:14%;width:36%;height:30%}
  .saved-card .mini .shoes  {right:5%;top:58%;width:36%;height:22%}
  .saved-card .mini.dress-mode .top{display:none}
  .saved-card .mini.dress-mode .bottom{top:6%;height:88%}
  .saved-card .del{
    position:absolute;right:6px;top:6px;
    background:rgba(255,255,255,.92);
    width:24px;height:24px;border-radius:50%;
    display:grid;place-items:center;font-size:11px;
    color:var(--ink);border:1px solid var(--hair);
  }

  .empty-state{
    text-align:center;padding:60px 20px;
    color:var(--ink-soft);
    font-family:var(--display);font-size:13px;font-weight:400;
    line-height:1.7;
  }

  /* toast */
  .toast{
    position:fixed;left:50%;bottom:84px;transform:translateX(-50%);
    background:var(--ink);color:var(--bg);
    padding:10px 22px;
    font-family:var(--display);font-size:12px;font-weight:500;
    letter-spacing:-.005em;
    z-index:80;
  }

  /* boot loader */
  #bootMsg{
    position:absolute;inset:0;display:flex;
    align-items:center;justify-content:center;
    color:rgba(255,253,247,.85);
    font-family:var(--display);font-size:13px;font-weight:400;
    pointer-events:none;
  }
</style>
</head>
<body>

<div id="__bootError" style="display:none;position:fixed;inset:0;
   background:#fff;color:#1a1612;padding:20px;font:14px/1.5 -apple-system,sans-serif;z-index:200;
   overflow:auto"></div>

<header class="app">
  <div class="brand-mark">Leila</div>
  <button class="header-btn" id="randomBtn" title="Shuffle">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor"
         stroke-width="1.4" stroke-linecap="round">
      <path d="M3 4h3l3 4 3-4M3 12h3l3-4M9 12h3"/>
    </svg>
  </button>
</header>

<main>

  <!-- LOOK BOOK -->
  <section class="view active" id="view-look">
    <div class="canvas-wrap" id="canvas">
      <div class="slot top empty"    data-slot="top">Top</div>
      <div class="slot bottom empty" data-slot="bottom">Bottom</div>
      <div class="slot bag empty"    data-slot="bag">Bag</div>
      <div class="slot shoes empty"  data-slot="shoes">Shoes</div>
      <div id="bootMsg">loading</div>
    </div>
    <div class="canvas-actions">
      <button class="primary" id="saveLook">Save look</button>
      <button id="randomLook">Shuffle</button>
      <button class="muted" id="clearLook">Reset</button>
    </div>
  </section>

  <!-- WARDROBE -->
  <section class="view" id="view-ward">
    <div class="cat-strip" id="catTabs"></div>
    <div class="item-grid" id="itemGrid"></div>
  </section>

  <!-- FAVORITES -->
  <section class="view" id="view-fav">
    <div class="section-title">Saved looks</div>
    <div class="saved-list" id="savedLooks"></div>
    <div class="section-title">Favourite pieces</div>
    <div class="item-grid" id="favItems"></div>
  </section>

</main>

<!-- picker -->
<div class="picker" id="picker">
  <div class="picker-sheet">
    <div class="picker-head">
      <h3 id="pickerTitle">Choose</h3>
      <button class="close" id="pickerClose">×</button>
    </div>
    <div class="picker-list" id="pickerList"></div>
  </div>
</div>

<!-- tab bar -->
<nav class="tabbar">
  <button data-view="look" class="active">Look book</button>
  <button data-view="ward">Archive</button>
  <button data-view="fav">Saved</button>
</nav>

function __ootdShowError(msg){
  var e=document.getElementById("__bootError");
  if(!e) return;
  e.style.display="block";
  e.innerHTML="<h3 style='margin:0 0 8px;font-family:Didot,serif;font-style:italic'>Cannot load</h3>"
    +"<p style='margin:0 0 10px'>App did not load completely:</p>"
    +"<pre style='background:#f4eee2;padding:10px;font-size:12px;white-space:pre-wrap;word-break:break-all'>"
    +String(msg).replace(/[<>&]/g, c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]))+"</pre>"
    +"<button onclick='try{localStorage.clear()}catch(e){};location.reload()' "
    +"style='margin-top:10px;padding:8px 14px;background:#1a1612;color:#fff;border:0;letter-spacing:.18em;text-transform:uppercase;font-size:10px'>"
    +"Reset and reload</button>";
}
window.addEventListener("error", function(ev){
  __ootdShowError((ev.error && ev.error.stack) || ev.message || "unknown error");
});

try {
  if (!window.OOTD_DATA || !Array.isArray(window.OOTD_DATA.items) || window.OOTD_DATA.items.length===0) {
    throw new Error("OOTD_DATA missing or empty");
  }
} catch(e){ __ootdShowError(e.message || e); }

(function(){
  const D = window.OOTD_DATA;
  if (!D || !D.items || D.items.length===0) return;
  const $  = sel => document.querySelector(sel);
  const $$ = sel => Array.from(document.querySelectorAll(sel));
  const itemById = Object.fromEntries(D.items.map(i=>[i.id,i]));

  // storage with iOS Quick-Look fallback
  const KEY = "leila_ootd_v3";
  let _ls = null;
  try { _ls = window.localStorage; _ls.setItem("__t__","1"); _ls.removeItem("__t__"); }
  catch(e){ _ls = null; }
  const _mem = {};
  const store = {
    load(){
      try{
        if(!_ls) return _mem.state || {favItems:[],savedLooks:[]};
        const raw = _ls.getItem(KEY);
        return (raw && JSON.parse(raw)) || {favItems:[],savedLooks:[]};
      } catch(e){ return {favItems:[],savedLooks:[]}; }
    },
    save(s){
      try{ _mem.state = s; if(_ls) _ls.setItem(KEY, JSON.stringify(s)); }
      catch(e){}
    }
  };
  let state = store.load();

  // tabs
  $$("nav.tabbar button").forEach(b=>b.addEventListener("click",()=>{
    $$("nav.tabbar button").forEach(x=>x.classList.remove("active"));
    $$(".view").forEach(v=>v.classList.remove("active"));
    b.classList.add("active");
    $("#view-"+b.dataset.view).classList.add("active");
    if(b.dataset.view==="fav") renderFavs();
    if(b.dataset.view==="ward") renderWardrobe();
    window.scrollTo({top:0,behavior:"instant"});
  }));

  // canvas / outfit
  let outfit = {top:null, bottom:null, bag:null, shoes:null};
  const isDress = id => id && itemById[id] && itemById[id].category==="dress";
  function renderCanvas(){
    const c = $("#canvas");
    const dressMode = isDress(outfit.bottom) || isDress(outfit.top);
    c.classList.toggle("dress-mode", dressMode);
    [["top","Top"],
     ["bottom", dressMode? "Dress":"Bottom"],
     ["bag","Bag"], ["shoes","Shoes"]].forEach(([slot,label])=>{
      const el = c.querySelector(`[data-slot="${slot}"]`);
      const id = outfit[slot];
      if(id && itemById[id]){
        el.classList.remove("empty");
        el.innerHTML = `<img src="${itemById[id].src}" alt="">`;
      }else{
        el.classList.add("empty");
        el.textContent = label;
      }
    });
  }

  $$("#canvas .slot").forEach(s=>s.addEventListener("click",()=>openPicker(s.dataset.slot)));

  // picker
  let pickerSlot = null;
  function categoriesFor(slot){
    if(slot==="top")    return ["top","jacket","dress"];
    if(slot==="bottom") return ["pants","skirt","dress"];
    if(slot==="bag")    return ["bag"];
    if(slot==="shoes")  return ["shoes"];
    return [];
  }
  function openPicker(slot){
    pickerSlot = slot;
    const titleMap = {top:"Top / Jacket",bottom:"Bottom / Dress",
      bag:"Bag",shoes:"Shoes"};
    $("#pickerTitle").textContent = titleMap[slot];
    const cats = categoriesFor(slot);
    const list = D.items.filter(i=>cats.includes(i.category));
    const wrap = $("#pickerList");
    wrap.innerHTML = "";
    const clr = document.createElement("button");
    clr.className = "ic clear";
    clr.textContent = "Remove";
    clr.addEventListener("click",()=>{ outfit[slot]=null; renderCanvas(); closePicker(); });
    wrap.appendChild(clr);
    const currentId = outfit[slot];
    list.forEach(it=>{
      const b = document.createElement("button");
      b.className = "ic" + (it.id===currentId?" selected":"");
      b.innerHTML = `<img src="${it.src}" alt="">`;
      b.title = (it.brand?it.brand+" — ":"")+it.name;
      b.addEventListener("click",()=>{
        outfit[slot] = it.id;
        if(isDress(it.id)){
          if(slot==="top") outfit.bottom = it.id;
          else outfit.top = null;
        }else if(slot==="bottom" && isDress(outfit.top)){
          outfit.top = null;
        }else if(slot==="top" && isDress(outfit.bottom)){
          outfit.bottom = null;
        }
        renderCanvas();
        closePicker();
      });
      wrap.appendChild(b);
    });
    $("#picker").classList.add("open");
  }
  function closePicker(){ $("#picker").classList.remove("open"); }
  $("#pickerClose").addEventListener("click",closePicker);
  $("#picker").addEventListener("click",e=>{ if(e.target.id==="picker") closePicker(); });

  // random
  function pick(cats){
    const pool = D.items.filter(i=>cats.includes(i.category));
    return pool.length? pool[Math.floor(Math.random()*pool.length)] : null;
  }
  function rollOutfit(){
    const dressChance = Math.random()<0.22;
    if(dressChance){
      const dress = pick(["dress"]);
      outfit.top = dress?dress.id:null;
      outfit.bottom = dress?dress.id:null;
    }else{
      const top    = pick(["top","jacket"]);
      const bottom = pick(["pants","skirt"]);
      outfit.top    = top?top.id:null;
      outfit.bottom = bottom?bottom.id:null;
    }
    outfit.bag   = (pick(["bag"])||{}).id || null;
    outfit.shoes = (pick(["shoes"])||{}).id || null;
    renderCanvas();
  }
  $("#randomLook").addEventListener("click",rollOutfit);
  $("#randomBtn").addEventListener("click",()=>{
    $$("nav.tabbar button").forEach(x=>x.classList.remove("active"));
    $$(".view").forEach(v=>v.classList.remove("active"));
    document.querySelector('nav.tabbar [data-view="look"]').classList.add("active");
    $("#view-look").classList.add("active");
    rollOutfit();
  });
  $("#clearLook").addEventListener("click",()=>{
    outfit={top:null,bottom:null,bag:null,shoes:null};
    renderCanvas();
  });
  $("#saveLook").addEventListener("click",()=>{
    if(!Object.values(outfit).some(Boolean)){ flash("Empty look"); return; }
    state.savedLooks.unshift({id:"saved-"+Date.now(), ts:Date.now(), ...outfit});
    store.save(state);
    flash("Saved");
  });
  function flash(msg){
    const t = document.createElement("div");
    t.textContent = msg; t.className = "toast";
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),1400);
  }

  // wardrobe
  let activeCat = "all";
  function renderCatTabs(){
    const wrap = $("#catTabs");
    wrap.innerHTML = "";
    const labels = {all:"All", ...D.categories};
    const order = ["all", ...D.order];
    // English/short names for elegant tracked caps
    const en = {all:"All", top:"Knits & Tops", jacket:"Outerwear", dress:"Dresses",
                pants:"Trousers", skirt:"Skirts", bag:"Bags",
                shoes:"Shoes", accessory:"Jewellery"};
    order.forEach(k=>{
      const b = document.createElement("button");
      b.className = "cat-tab" + (k===activeCat?" active":"");
      b.textContent = en[k] || labels[k];
      b.addEventListener("click",()=>{ activeCat = k; renderWardrobe(); });
      wrap.appendChild(b);
    });
  }
  function renderWardrobe(){
    renderCatTabs();
    const grid = $("#itemGrid");
    grid.innerHTML = "";
    const filtered = activeCat==="all" ? D.items
      : D.items.filter(i=>i.category===activeCat);
    if(filtered.length===0){
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">no pieces in this category</div>`;
      return;
    }
    filtered.forEach(it=>{
      const c = document.createElement("div");
      c.className = "item-card";
      const brand = it.brand ? `<div class="brand">${it.brand}</div>` : "";
      c.innerHTML = `
        <button class="fav ${state.favItems.includes(it.id)?"on":""}" data-id="${it.id}">♡</button>
        <div class="ph"><img src="${it.src}" alt=""></div>
        <div class="meta">
          ${brand}
          <div class="name">${it.name}</div>
        </div>`;
      c.querySelector(".fav").addEventListener("click",e=>{
        e.stopPropagation();
        toggleArr(state.favItems,it.id);
        store.save(state);
        e.currentTarget.classList.toggle("on");
      });
      grid.appendChild(c);
    });
  }

  function renderFavs(){
    const sv = $("#savedLooks");
    sv.innerHTML = "";
    if(state.savedLooks.length===0){
      sv.innerHTML = `<div class="empty-state" style="grid-column:1/-1">save a look from the editor</div>`;
    }else{
      state.savedLooks.forEach(s=>{
        const card = document.createElement("div");
        card.className = "saved-card";
        const dressMode = isDress(s.bottom) || isDress(s.top);
        const mini = document.createElement("div");
        mini.className = "mini" + (dressMode?" dress-mode":"");
        ["top","bottom","bag","shoes"].forEach(slot=>{
          const id = s[slot]; if(!id) return;
          const it = itemById[id]; if(!it) return;
          const img = document.createElement("img");
          img.src = it.src; img.className = slot;
          mini.appendChild(img);
        });
        card.appendChild(mini);
        const del = document.createElement("button");
        del.className = "del"; del.textContent = "×";
        del.addEventListener("click",e=>{
          e.stopPropagation();
          state.savedLooks = state.savedLooks.filter(x=>x.id!==s.id);
          store.save(state); renderFavs();
        });
        card.appendChild(del);
        card.addEventListener("click",e=>{
          if(e.target===del) return;
          outfit = {top:s.top,bottom:s.bottom,bag:s.bag,shoes:s.shoes};
          renderCanvas();
          $$("nav.tabbar button").forEach(x=>x.classList.remove("active"));
          $$(".view").forEach(v=>v.classList.remove("active"));
          document.querySelector('nav.tabbar [data-view="look"]').classList.add("active");
          $("#view-look").classList.add("active");
          window.scrollTo({top:0});
        });
        sv.appendChild(card);
      });
    }
    const fi = $("#favItems");
    fi.innerHTML = "";
    if(state.favItems.length===0){
      fi.innerHTML = `<div class="empty-state" style="grid-column:1/-1">tap ♡ on any piece to save</div>`;
    }else{
      state.favItems.forEach(id=>{
        const it = itemById[id]; if(!it) return;
        const c = document.createElement("div");
        c.className = "item-card";
        const brand = it.brand ? `<div class="brand">${it.brand}</div>` : "";
        c.innerHTML = `
          <button class="fav on">♡</button>
          <div class="ph"><img src="${it.src}" alt=""></div>
          <div class="meta">
            ${brand}
            <div class="name">${it.name}</div>
          </div>`;
        c.querySelector(".fav").addEventListener("click",e=>{
          e.stopPropagation();
          state.favItems = state.favItems.filter(x=>x!==id);
          store.save(state); renderFavs(); renderWardrobe();
        });
        fi.appendChild(c);
      });
    }
  }

  function toggleArr(arr,v){
    const i = arr.indexOf(v);
    if(i>=0) arr.splice(i,1); else arr.push(v);
  }

  // boot loader removal
  try { const bm = document.getElementById("bootMsg"); if (bm) bm.remove(); } catch(_){}

  try { rollOutfit(); }
  catch(e) {
    outfit={top:null,bottom:null,bag:null,shoes:null};
    try { renderCanvas(); } catch(_){}
  }
  try { renderCatTabs(); } catch(_) {}
  try { renderWardrobe(); } catch(_) {}
})();
</script>
</body>
</html>
